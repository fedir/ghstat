build:
    environment:
        go:
            version: go1.24.0
    tests:
        override:
            -
                command: 'export PATH="$PATH:$(go env GOPATH)/bin" && go test -coverprofile=cover.out $(go list ./... | grep -v /tmp/ | grep -v /test_data/)'
                coverage:
                    file: 'cover.out'
                    format: 'go-cc'
